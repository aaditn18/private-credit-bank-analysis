# 20 hand-graded analyst questions for measuring faithfulness + citation recall.
#
# For each question we record:
#   - expect_banks:  tickers we expect the decomposer to pull out
#   - expect_concepts: taxonomy concept keys we expect to match
#   - expect_doc_types: at least one hit should come from these doc types
#   - must_contain_keywords: the answer markdown must contain ALL of these
#                            (case-insensitive). Use sparingly; citations
#                            are the primary signal.
#
# The runner scores each rule and emits faithfulness / citation-recall stats.

version: 1

